<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Handling</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            position: relative;
            padding: 30px;
        }

        /* #box {
            position: absolute;
            transition: all cubic-bezier(0.19, 1, 0.22, 1) 0.2s;
            width: 400px;
            height: 400px;
            background-color: red;
        } */

        #rectangle {
            width: 400px;
            height: 400px;
            background-color: red;
        }

        .highlight {
            color: red;
        }

        h2 {
            text-transform: capitalize;
        }

        #main {
            width: 100%;
            height: 100%;
            background-color: black;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            height: 100px;
            background-color: #444;
        }

        a {
            color: beige !important;

        }

        button {
            padding: 12px 22px;
            background-color: rgb(250, 78, 115);
            border-radius: 5px;
            border: none;
            font-weight: 600;
            font-size: 20px;
        }

        .a {
            width: 80%;
            height: 80%;
            background-color: brown;
        }


        .b {
            width: 80%;
            height: 80%;
            background-color: burlywood;
        }


        .c {
            width: 80%;
            height: 80%;
            background-color: bisque;
        }
    </style>
</head>

<body>
    <h1>Apple</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Unde, nulla?</p>
    <input type="text" placeholder="Name">

    <h2 id="device">Select Your Device</h2>
    <select>
        <option selected disabled>Choose your Device</option>
        <option value="samsung">Samsung</option>
        <option value="apple">Iphone</option>
        <option value="mi">Xiaomi</option>
        <option value="oppo">Oppo</option>
    </select>

    <!-- <div id="box"></div> -->
    <div id="rectangle"></div>

    <form>
        <input type="email">
        <input type="password">
        <input type="submit">
    </form>

    <div id="main">
        <div class="nav">
            <a href="">Home</a>
            <a href="">About</a>
            <!-- <button>Click Me</button> -->
        </div>
    </div>

    <div class="a">
        <div class="b">
            <div class="c">
                <button>Click Me</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
